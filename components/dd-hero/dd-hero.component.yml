$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Hero
description: A hero component with an image and content slot
props:
  type: object
  required:
    - image
  properties:
    image:
      title: 'Image'
      $ref: json-schema-definitions://canvas.module/image
      # @todo `type: object` should not be necessary, it's because \Drupal\sdc\Component\ComponentValidator::getClassProps() does not yet support $ref
      type: object
      examples:
        - src: 600x400.png
          alt: 'Boring placeholder'
          width: 600
          height: 400
    image_first:
      title: Image First
      description: When true, the image appears before the content slot; when false, content appears first
      type: boolean
      default: true
      examples:
        - true
slots:
  content:
    title: Content
    description: The content to display alongside the image (e.g. heading, text, CTA)
    examples:
      - <h2>Welcome to our site</h2><p>Discover what we have to offer.</p>
